name: Release portable zip

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (for manual reruns), e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows-portable:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend and server dependencies
        run: npm ci

      - name: Type check and production web build
        run: npm run check

      - name: Build portable zip
        shell: pwsh
        run: npm run desktop:portable

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteDesk-portable-win-x64
          path: output/NoteDesk-portable-win-x64.zip
          if-no-files-found: error

      - name: Publish zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: output/NoteDesk-portable-win-x64.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
